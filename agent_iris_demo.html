<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Iris Attack Path | Project Sentinel Demo</title>
  
  <!-- Load Outfit font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Load React & ReactDOM (production) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Load Babel Standalone for JSX compilation in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --bg-color: #0b0f19;
      --panel-bg: rgba(20, 26, 43, 0.75);
      --border-color: rgba(255, 255, 255, 0.1);
      --accent-blue: #3b82f6;
      --accent-red: #ef4444;
      --accent-green: #10b981;
      --accent-purple: #8b5cf6;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      background-image: 
        radial-gradient(at 0% 0%, rgba(20, 26, 43, 1) 0, transparent 50%), 
        radial-gradient(at 50% 100%, rgba(15, 23, 42, 1) 0, transparent 50%);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    /* Standalone Centered Container */
    .dashboard-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    .agent-chat-container {
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-width: 650px;
      width: 100%;
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
      margin: 0 auto;
      overflow: hidden;
    }

    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
      background: rgba(255,255,255,0.02);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .agent-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--accent-blue);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .chat-messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message-row { display: flex; gap: 8px; width: 100%; align-items: flex-end; }
    .message-row.user { justify-content: flex-end; }
    
    .message-content { max-width: 85%; }
    
    .mini-avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--accent-blue); font-size: 12px; }
    .mini-avatar.user { background: #475569; }

    .chat-bubble {
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(255,255,255,0.05);
      font-size: 13px;
      line-height: 1.5;
      color: #e2e8f0;
    }

    .card-container {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 16px;
      width: 100%;
    }
    .card-container.border-green { border-left: 4px solid var(--accent-green); }

    .btn-primary {
      background: white; color: black; border: none; padding: 10px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,255,255,0.15); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .btn-outline { background: transparent; color: white; border: 1px solid var(--border-color); padding: 10px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-outline:hover:not(:disabled) { background: rgba(255,255,255,0.05); }

    /* Glowing Bullet Syncing */
    .capability-bullet {
      transition: all 0.3s ease;
      padding: 2px 6px;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 4px;
    }

    .capability-bullet.glow {
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa !important;
      text-shadow: 0 0 8px rgba(96, 165, 250, 0.6);
      transform: translateX(4px);
    }

    .capability-bullet.completed {
      color: var(--accent-green) !important;
      text-decoration: line-through;
      opacity: 0.6;
    }

    /* CVE & Mitigation Cards */
    .cve-list { display: flex; flex-direction: column; gap: 8px; }
    .cve-card {
      padding: 12px; border-radius: 8px; background: rgba(15,23,42,0.8); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.2s;
    }
    .cve-card:hover { border-color: rgba(255,255,255,0.3); }
    .cve-card.selected { border-color: var(--accent-blue); background: rgba(59,130,246,0.1); }

    .mitigation-card {
      border: 1px solid rgba(16,185,129,0.3);
      background: rgba(16,185,129,0.05);
      padding: 12px;
      border-radius: 8px;
      margin-top: 8px;
    }

    /* Typing indicators */
    .typing-indicator {
      display: flex; gap: 4px; padding: 12px 16px; background: rgba(30, 41, 59, 0.6); border-radius: 12px; width: fit-content;
    }
    .dot { width: 6px; height: 6px; background: #cbd5e1; border-radius: 50%; animation: wave 1.3s linear infinite; }
    .dot:nth-child(2) { animation-delay: -1.1s; }
    .dot:nth-child(3) { animation-delay: -0.9s; }
    @keyframes wave { 0%, 60%, 100% { transform: initial; } 30% { transform: translateY(-4px); } }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
  </style>
</head>
<body>

  <div id="root" class="dashboard-container"></div>

  <!-- React Code inside Babel Script -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // Seed initial registration events
    const initialSeedEvents = [
      {
        header: { event_id: "seed-uuid-reg-workload-dev-discovery", timestamp: new Date(Date.now() - 240000).toISOString(), agent_id: "sidecar-observer-workload-dev-discovery", event_type: "agent_registration" },
        context: { resource_id: "workload-dev-discovery", environment: "production-k8s-cluster" },
        payload: { category: "Telemetry Agent Registration", finding: "Sidecar observer daemon registered successfully on Discovery Asset VM workload.", severity: "INFO", evidence: { serviceName: "UAT Dev Env" } },
        path_metadata: { is_critical_path: false, exploitability_score: 0 }
      },
      {
        header: { event_id: "seed-uuid-reg-workload-finance-ai", timestamp: new Date(Date.now() - 180000).toISOString(), agent_id: "sidecar-observer-workload-finance-ai", event_type: "agent_registration" },
        context: { resource_id: "workload-finance-ai", environment: "production-k8s-cluster" },
        payload: { category: "Telemetry Agent Registration", finding: "Sidecar observer daemon registered successfully on Finance Auto-Billing Agent workload.", severity: "INFO", evidence: { serviceName: "AI Agent Runtime" } },
        path_metadata: { is_critical_path: false, exploitability_score: 0 }
      },
      {
        header: { event_id: "seed-uuid-reg-workload-database-core", timestamp: new Date(Date.now() - 120000).toISOString(), agent_id: "sidecar-observer-workload-database-core", event_type: "agent_registration" },
        context: { resource_id: "workload-database-core", environment: "production-k8s-cluster" },
        payload: { category: "Telemetry Agent Registration", finding: "Sidecar observer daemon registered successfully on Customer Root Database workload.", severity: "INFO", evidence: { serviceName: "Data Store" } },
        path_metadata: { is_critical_path: false, exploitability_score: 0 }
      },
      {
        header: { event_id: "seed-uuid-reg-workload-vpn", timestamp: new Date(Date.now() - 60000).toISOString(), agent_id: "sidecar-observer-workload-vpn", event_type: "agent_registration" },
        context: { resource_id: "workload-vpn", environment: "production-k8s-cluster" },
        payload: { category: "Telemetry Agent Registration", finding: "Sidecar observer daemon registered successfully on VPN Access Gateway workload.", severity: "INFO", evidence: { serviceName: "Network perimeter" } },
        path_metadata: { is_critical_path: false, exploitability_score: 0 }
      }
    ];

    // --- Standalone Mock API Handler ---
    const callAttackPathApi = async (options = {}) => {
      await new Promise(resolve => setTimeout(resolve, 800));

      if (options.method === 'GET') {
        if (options.scenarioId === 'critical-attack-path-discovery') {
          return {
            analysis: {
              activePaths: 3,
              pcsScore: 9.2,
              paths: [
                { id: 'PATH-001', title: 'Discovery Asset -> Active Directory Core', techniques: ['T1190', 'T1505', 'T1003', 'T1550'], nodeIds: [1,2,3,4,5], pcs: 9.2 },
                { id: 'PATH-002', title: 'External DMZ -> Active Directory Core', techniques: ['T1611', 'T1068'], nodeIds: [1,2,3,4], pcs: 7.2 },
                { id: 'PATH-003', title: 'Phishing Target -> Active Directory Core', techniques: ['T1566', 'T1078', 'T1550'], nodeIds: [1,2,3,4], pcs: 8.5 }
              ]
            }
          };
        }
        if (options.scenarioId === 'ai-agent-posture') {
          return {
            analysis: {
              activePaths: 1,
              pcsScore: 10.0
            }
          };
        }
        return {
          analysis: {
            activePaths: 4,
            pcsScore: 9.2,
            topPath: { title: 'Discovery Asset -> Active Directory Core', owners: ['DevOps', 'AppSec', 'Platform', 'IAM'], id: 'PATH-002' },
            chokePoints: [{ label: 'BOLA Exploit' }]
          }
        };
      }

      if (options.body?.intent === 'simulate') {
        if (options.body.scenarioId === 'ai-agent-posture') {
          return { selectedPath: { pcs: 10.0 } };
        }
        if (options.body.scenarioId === 'critical-attack-path-discovery') {
          return { selectedPath: { pcs: 9.2 } };
        }
        return {
          selectedPath: {
            id: 'PATH-002',
            pcs: 9.2,
            techniques: ['T1190', 'T1505', 'T1003', 'T1550'],
            evidence: ['Shadow API endpoint lacks object-level authorization.'],
            pcsBreakdown: [
              { label: 'Exploit confidence', value: 8.5, weight: 'Composite edge risk.' },
              { label: 'Crown-jewel value', value: 1.8, weight: 'AD Core value.' },
              { label: 'Blast radius', value: 0.5, weight: '2 exposed databases.' },
              { label: 'Convergence bonus', value: 0.7, weight: 'Crosses choke point.' },
              { label: 'Final PCS', value: 9.2, weight: 'Normalized risk score.' }
            ]
          },
          blastRadius: [{ id: 'BR1', label: 'HR Database' }, { id: 'BR2', label: 'Finance API' }],
          mitigationOptions: [
            { id: 'segmentation-mfa', label: 'Segment Network + MFA', targetNode: 'F', blockedEdges: ['eC-F', 'eK-F', 'eF-G'], deployTime: 'Minutes', downtime: 'None', approvalGate: 'IAM and Network approval', policyType: 'NetworkPolicy + MFA', rollback: 'Disable rule', residualRisk: 'Very low', effectiveness: 0.94, summary: 'Blocks movement.', owner: 'IAM', pathsClosed: 2, scoreReduction: 0.7, residualPcs: 8.5 },
            { id: 'patch-shadow-api', label: 'Patch CVE-2023-50164', targetNode: 'B', blockedEdges: ['eA-B', 'eB-C'], deployTime: '4 hours', downtime: 'Maintenance window', approvalGate: 'CAB approval', policyType: 'Patch PR', rollback: 'Revert PR', residualRisk: 'Low', effectiveness: 0.86, summary: 'BOLA fix.', owner: 'AppSec', pathsClosed: 2, scoreReduction: 0.7, residualPcs: 8.5 }
          ]
        };
      }

      if (options.body?.intent === 'mitigate') {
        if (options.body.scenarioId === 'ai-agent-posture') {
          return { pcsScore: 0.0, activePaths: 0 };
        }
        if (options.body.scenarioId === 'critical-attack-path-discovery') {
          return { pcsScore: 7.7, activePaths: 2 };
        }
        return {
          mitigation: {
            label: 'Segment Network + MFA',
            targetNode: 'F',
            approvalGate: 'IAM and Network dual approval',
            rollback: 'Disable conditional access rule'
          },
          pcsScore: 8.5,
          activePaths: 2
        };
      }

      if (options.body?.intent === 'policy') {
        return {
          type: 'NetworkPolicy + MFA',
          content: `apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: block-identity-provider-lateral-movement
spec:
  podSelector:
    matchLabels:
      app: identity-provider`
        };
      }

      if (options.body?.intent === 'report') {
        return {
          headline: 'Network Segmentation reduces top PCS from 9.2 to 8.5.',
          businessImpact: '2 blast-radius assets protected; residual paths fall to 2.',
          technicalSummary: 'Mitigated identity provider lateral movement.',
          recommendedAction: 'Apply Istio AuthorizationPolicy.',
          approvalGate: 'Security CAB approval.',
          rollback: 'Disable rule.'
        };
      }

      if (options.body?.intent === 'what-if') {
        return {
          answer: 'Removing VPN gateway access severs Case 3 phishing route. Top PCS score falls to 8.5.'
        };
      }
    };

    // --- Standalone Agent Iris UI component ---
    function AgentAttackPathAgentChat() {
      const [messages, setMessages] = useState([]);
      const [chatPhase, setChatPhase] = useState('intro');
      const [selectedPath, setSelectedPath] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const [showAudit, setShowAudit] = useState(false);
      const [eventLog, setEventLog] = useState(initialSeedEvents);
      const [selectedEvent, setSelectedEvent] = useState(null);
      const [phase3Analysis, setPhase3Analysis] = useState(null);
      const [phase3Simulation, setPhase3Simulation] = useState(null);
      const [phase3Remediation, setPhase3Remediation] = useState(null);
      const [phase3Policy, setPhase3Policy] = useState(null);
      const [phase3Report, setPhase3Report] = useState(null);
      const [whatIfAnswer, setWhatIfAnswer] = useState('');
      
      const [hoveredPhase, setHoveredPhase] = useState(null);
      const [completedPhases, setCompletedPhases] = useState({ phase1: false, phase2: false, phase3: false });

      const endOfChatRef = useRef(null);
      const initRef = useRef(false);

      const pushMessage = useCallback((msg, delay) => {
        setIsTyping(true);
        setTimeout(() => {
          setIsTyping(false);
          setMessages(prev => [...prev, msg]);
        }, delay);
      }, []);

      useEffect(() => {
        if (chatPhase === 'intro' && messages.length === 0 && !initRef.current) {
          initRef.current = true;
          pushMessage({ sender: 'agent', identity: 'Sentinel Orchestrator', color: '#3b82f6', type: 'intro_prompt' }, 1000);
        }
        endOfChatRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [chatPhase, messages.length, pushMessage]);

      // Push custom event mock onto our event log
      const pushTelemetryEvent = (type, resourceId, finding, severity, score = 0, isCrit = false, extra = {}) => {
        const newEvent = {
          header: {
            event_id: `mock-uuid-${Math.random().toString(36).substring(4)}`,
            timestamp: new Date().toISOString(),
            agent_id: `sidecar-observer-${resourceId}`,
            event_type: type
          },
          context: {
            resource_id: resourceId,
            environment: "production-k8s-cluster"
          },
          payload: {
            category: type.replace('_', ' ').toUpperCase(),
            finding: finding,
            severity: severity,
            evidence: extra
          },
          path_metadata: {
            is_critical_path: isCrit,
            exploitability_score: score
          }
        };
        setEventLog(prev => [...prev, newEvent]);
      };

      // Derived audit logs mapped directly to backend eventStore stream
      const activeAuditLogs = useMemo(() => {
        return eventLog.map(evt => {
          const typeLabel = evt.header.event_type.replace('_', ' ').toUpperCase();
          return {
            event: evt,
            time: new Date(evt.header.timestamp).toLocaleTimeString(),
            text: `[${typeLabel}] ${evt.context.resource_id}: ${evt.payload.finding} (${evt.payload.severity})`
          };
        });
      }, [eventLog]);

      // Use Case 1: Continuous validation (drift)
      const handleStartScoping = async () => {
        setChatPhase('discovery');
        setMessages(prev => [...prev, { sender: 'user', type: 'text', content: "Begin continuous validation. Trigger workload config drift." }]);
        
        // Push configuration drift event to list
        pushTelemetryEvent(
          'config_drift', 
          'workload-dev-discovery', 
          'Unauthorized network configuration drift detected. Shadow API ingress port 8080 exposed to external traffic.', 
          'CRITICAL',
          9.2,
          true,
          { exposedPort: 8080, protocol: 'TCP' }
        );

        setTimeout(() => {
            pushMessage({ sender: 'agent', identity: 'Telemetry Observer', color: '#ef4444', type: 'text', content: "Drift event published to the Event Bus! The sidecar detected an open port drift on workload-dev-discovery." }, 800);
        }, 1000);

        try {
          const result = await callAttackPathApi({ method: 'GET', scenarioId: 'critical-attack-path-discovery' });
          const apiPaths = result.analysis.paths.map(p => ({
            id: p.id + ': ' + p.title,
            nexus: p.techniques.join(', '),
            nodes: p.nodeIds.length,
            score: p.pcs
          }));

          setTimeout(() => {
              pushMessage({ sender: 'agent', identity: 'Sentinel Engine', color: '#3b82f6', type: 'text', content: `The Path Engine completed real-time calculations: ${result.analysis.activePaths} paths are now active. Select a compromised path to proceed.` }, 2500);
          }, 1500);

          setTimeout(() => {
              setMessages(prev => [...prev, { sender: 'agent', type: 'path_selection', data: apiPaths }]);
              setChatPhase('selection');
          }, 4500);
        } catch (error) {
          setMessages(prev => [...prev, { sender: 'agent', type: 'text', content: `Path discovery failed: ${error.message}` }]);
          setChatPhase('intro');
        }
      };

      const handlePathSelect = (pathId) => {
        setSelectedPath(pathId);
        setMessages(prev => [...prev, { sender: 'user', type: 'text', content: `Analyze path: ${pathId}` }]);
        
        setTimeout(() => {
           pushMessage({ sender: 'agent', identity: 'Simulation Daemon', color: '#a855f7', type: 'text', content: `Simulation Daemon engaged. I will execute a validation query simulating a lateral movement chain along this path.` }, 800);
        }, 500);

        setTimeout(() => {
           setMessages(prev => [...prev, { sender: 'agent', type: 'assessment_action', pathId: pathId }]);
        }, 1800);
      };

      const handleRunAssessment = async () => {
        setChatPhase('scanning');
        setMessages(prev => [...prev, { sender: 'user', type: 'text', content: "Simulate Attack Path Exploitation" }]);
        setIsTyping(true);
        
        try {
          const pathCode = selectedPath.split(':')[0];
          const result = await callAttackPathApi({ 
            body: { 
              intent: 'simulate', 
              scenarioId: 'critical-attack-path-discovery',
              pathId: pathCode 
            } 
          });
          
          setTimeout(() => {
            setIsTyping(false);
            setMessages(prev => [...prev, { sender: 'agent', type: 'scanning_results', pathId: selectedPath }]);
            setChatPhase('remediation_options');
          }, 2000);
        } catch (error) {
          setIsTyping(false);
          setMessages(prev => [...prev, { sender: 'agent', type: 'text', content: `Simulation failed: ${error.message}` }]);
        }
      };

      const handleViewRemediation = () => {
        setMessages(prev => [...prev, { sender: 'user', type: 'text', content: "Fetch Mitigation Strategy" }]);
        setTimeout(() => {
           pushMessage({ sender: 'agent', identity: 'Remediation Engine', color: '#fb923c', type: 'mitigation_options' }, 1200);
        }, 500);
      };

      const handleMitigate = async () => {
        setChatPhase('fixing');
        setMessages(prev => [...prev, { sender: 'user', type: 'text', content: "Deploy AWS WAF Policy Rule" }]);
        
        // Push mitigation event
        pushTelemetryEvent(
          'mitigation_applied', 
          'workload-dev-discovery', 
          'Enforced policy mitigation: AWS WAF Containment Rule. Posture hardened successfully.', 
          'INFO',
          0.0,
          false,
          { appliedMitigation: 'AWS WAF Containment Rule', scoreDelta: '-1.5' }
        );

        try {
          const result = await callAttackPathApi({ 
            body: { 
              intent: 'mitigate', 
              scenarioId: 'critical-attack-path-discovery',
              mitigationId: 'waf-rule'
            } 
          });
          
          setTimeout(() => {
             pushMessage({ sender: 'agent', identity: 'Remediation Engine', color: '#fb923c', type: 'text', content: `AWS WAF mitigation applied. The sidecar reports traffic to the Shadow API has been successfully blocked.` }, 800);
          }, 500);
          
          setTimeout(() => {
             setMessages(prev => [...prev, { sender: 'agent', type: 'mitigation_success' }]);
          }, 1500);

          setTimeout(() => {
             setIsTyping(true);
          }, 2200);

          setTimeout(() => {
             setIsTyping(false);
             setMessages(prev => [...prev, { sender: 'agent', type: 'revalidation_results' }]);
             setChatPhase('complete');
             setCompletedPhases(prev => ({ ...prev, phase1: true }));
          }, 3500);
        } catch (error) {
          setMessages(prev => [...prev, { sender: 'agent', type: 'text', content: `Mitigation failed: ${error.message}` }]);
        }
      };

      // Use Case 2: AI Agent Posture Validation
      const handleStartPhase2 = async () => {
        setChatPhase('phase2_discovery');
        setMessages(prev => [...prev, { sender: 'user', type: 'text', content: "Begin Case 2: AI Posture & Supply Chain Validation" }]);
        
        // Push vulnerability events
        pushTelemetryEvent(
          'vulnerability_discovery', 
          'workload-finance-ai', 
          'Finance Auto-Billing Agent: Insecure Prompt Egress vulnerability allows customer data exfiltration.', 
          'HIGH',
          10.0,
          true,
          { scanType: 'Dynamic Container Security Telemetry', cveRank: 10.0 }
        );

        setTimeout(() => {
            pushMessage({ sender: 'agent', identity: 'Telemetry Observer', color: '#3b82f6', type: 'text', content: "Analyzing AI supply chain telemetry. The sidecar on workload-finance-ai has flagged a critical exposure." }, 800);
        }, 500);

        try {
          const result = await callAttackPathApi({ method: 'GET', scenarioId: 'ai-agent-posture' });

          setTimeout(() => {
              pushMessage({ sender: 'agent', identity: 'Sentinel Engine', color: '#3b82f6', type: 'text', content: "Finance AI Agent is Internet-Exposed and possesses active read permissions to the Customer Root Database." }, 2000);
          }, 1000);

          setTimeout(() => {
              setMessages(prev => [...prev, { sender: 'agent', type: 'phase2_review_prompt' }]);
              setChatPhase('phase2_review');
          }, 3500);
        } catch (error) {
          setMessages(prev => [...prev, { sender: 'agent', type: 'text', content: `AI inventory mapping failed: ${error.message}` }]);
          setChatPhase('intro');
        }
      };

      const handlePhase2Simulate = async () => {
         setChatPhase('phase2_simulating');
         setMessages(prev => [...prev, { sender: 'user', type: 'text', content: "Simulate Prompt Injection exploit chain" }]);
         
         setTimeout(() => {
            pushMessage({ sender: 'agent', identity: 'Simulation Daemon', color: '#a855f7', type: 'text', content: "Simulating external Prompt Injection against the Finance AI Agent to exfiltrate database records." }, 800);
         }, 500);

         try {
           const result = await callAttackPathApi({ 
             body: { 
               intent: 'simulate',

               <div style={{ display: 'flex', gap: '12px', padding: '0 16px 16px 16px' }}>
                  {/* Events list */}
                  <div style={{ flex: 1.2, maxHeight: '150px', overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: '8px' }}>
                    {activeAuditLogs.length === 0 ? <div style={{fontSize:'11px', color:'#64748b'}}>No Sentinel events logged yet.</div> : 
                     activeAuditLogs.map((log, i) => (
                       <div 
                         key={i} 
                         style={{
                           fontSize: '11px', 
                           color: '#cbd5e1', 
                           display: 'flex', 
                           flexDirection: 'column', 
                           gap: '4px', 
                           borderLeft: '2px solid #3b82f6', 
                           paddingLeft: '8px',
                           cursor: 'pointer',
                           background: selectedEvent?.header?.event_id === log.event.header.event_id ? 'rgba(255,255,255,0.05)' : 'transparent'
                         }}
                         onClick={() => setSelectedEvent(log.event)}
                       >
                         <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '9px', color: '#64748b' }}>
                           <span>{log.time}</span>
                         </div>
                         <span>{log.text}</span>
                       </div>
                     ))
                    }
                  </div>

                  {/* Schema Inspector */}
                  <div style={{ flex: 1, background: 'rgba(0,0,0,0.3)', border: '1px solid rgba(255,255,255,0.08)', borderRadius: '6px', padding: '8px', maxHeight: '150px', overflowY: 'auto' }}>
                    <div style={{ fontSize: '8px', color: '#64748b', fontWeight: 'bold', marginBottom: '4px', borderBottom: '1px solid rgba(255,255,255,0.08)', paddingBottom: '2px' }}>
                      JSON-LD SCHEMA INSPECTOR
                    </div>
                    {selectedEvent ? (
                      <pre style={{ margin: 0, padding: 0, fontSize: '8px', fontFamily: 'monospace', color: '#cbd5e1', whiteSpace: 'pre-wrap', wordBreak: 'break-all' }}>
                        {JSON.stringify(selectedEvent, null, 2)}
                      </pre>
                    ) : (
                      <div style={{ height: '80%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#64748b', fontSize: '9px' }}>
                        Click log event to inspect JSON-LD
                      </div>
                    )}
                  </div>
               </div>
             )}

             {chatPhase === 'phase3_complete' && (
               <form onSubmit={handlePhase3NLQ} style={{ padding: '16px', borderTop: '1px solid rgba(255,255,255,0.05)' }}>
                  <input name="q" placeholder="Ask a hypothetical scenario..." style={{ width: '100%', padding: '12px', background: 'rgba(0,0,0,0.3)', border: '1px solid rgba(255,255,255,0.2)', color: 'white', borderRadius: '8px', fontSize: '12px' }} autoComplete="off" />
               </form>
             )}
          </div>
        </div>
      );
    }

    // Render the App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AgentAttackPathAgentChat />);
  </script>
</body>
</html>
