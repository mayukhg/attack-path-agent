<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agent Iris — Standalone</title>
<style>
:root {
  --bg: #07090f;
  --border: rgba(255,255,255,0.07);
  --blue: #3b82f6;
  --red: #ef4444;
  --green: #10b981;
  --purple: #8b5cf6;
  --orange: #fb923c;
  --teal: #14b8a6;
  --gold: #facc15;
  --text: #e2e8f0;
  --muted: #64748b;
  --dim: #334155;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 20%,rgba(59,130,246,.05) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 80%,rgba(139,92,246,.05) 0%,transparent 55%);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:13px;
  height:100vh;overflow:hidden;
  display:flex;flex-direction:column;
}
header{
  flex-shrink:0;height:52px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;
  border-bottom:1px solid var(--border);
  background:rgba(5,7,14,.98);
  backdrop-filter:blur(16px);
}
.hdr-left{display:flex;align-items:center;gap:12px;}
.hdr-avatar{
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;box-shadow:0 0 12px rgba(59,130,246,.4);flex-shrink:0;
}
.hdr-logo{font-size:14px;font-weight:700;background:linear-gradient(90deg,#60a5fa,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-sub{font-size:10px;color:var(--muted);letter-spacing:.4px;}
.live-row{display:flex;align-items:center;gap:7px;}
.live-dot{position:relative;display:inline-flex;width:7px;height:7px;}
.live-dot::before{content:'';position:absolute;inset:0;border-radius:50%;background:var(--blue);opacity:.4;animation:pulse 1.5s infinite;}
.live-dot span{display:inline-flex;width:7px;height:7px;border-radius:50%;background:var(--blue);}

.chat-wrap{flex:1;min-height:0;display:flex;justify-content:center;align-items:stretch;}
.chat-col{
  width:100%;max-width:720px;
  display:flex;flex-direction:column;
  border-left:1px solid var(--border);border-right:1px solid var(--border);
  background:rgba(10,13,22,.45);
}
.chat-subhdr{
  flex-shrink:0;padding:11px 16px;border-bottom:1px solid var(--border);
  background:rgba(8,11,20,.7);display:flex;align-items:center;gap:10px;
}
.badge-phase{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.3);margin-left:auto;}

#chat-messages{
  flex:1;min-height:0;overflow-y:auto;
  padding:16px;display:flex;flex-direction:column;gap:14px;
}
.msg-row{display:flex;gap:9px;align-items:flex-start;animation:fadeIn .3s ease;}
.msg-row.user{flex-direction:row-reverse;}
.msg-content{max-width:88%;display:flex;flex-direction:column;gap:4px;}
.msg-row.user .msg-content{align-items:flex-end;}
.identity{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-left:4px;}
.bubble{padding:10px 14px;border-radius:12px;background:rgba(20,27,46,.7);border:1px solid rgba(255,255,255,.06);font-size:12px;line-height:1.55;color:#cbd5e1;}
.bubble.user{background:#1e293b;border:none;color:var(--text);}
.bubble b,.bubble strong{color:var(--text);}
.av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;}
.av-blue  {background:linear-gradient(135deg,#3b82f6,#1d4ed8);box-shadow:0 0 8px rgba(59,130,246,.4);}
.av-purple{background:linear-gradient(135deg,#8b5cf6,#6d28d9);box-shadow:0 0 8px rgba(139,92,246,.4);}
.av-orange{background:linear-gradient(135deg,#fb923c,#c2410c);box-shadow:0 0 8px rgba(251,146,60,.4);}
.av-teal  {background:linear-gradient(135deg,#14b8a6,#0f766e);box-shadow:0 0 8px rgba(20,184,166,.4);}
.av-red   {background:linear-gradient(135deg,#ef4444,#b91c1c);box-shadow:0 0 8px rgba(239,68,68,.5);}
.av-green {background:linear-gradient(135deg,#10b981,#047857);box-shadow:0 0 8px rgba(16,185,129,.4);}
.av-gray  {background:#334155;}

/* Cards */
.card{border-radius:10px;padding:14px;width:100%;font-size:12px;}
.card-dark  {background:rgba(20,27,46,.7);border:1px solid rgba(255,255,255,.07);}
.card-red   {background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.3);}
.card-green {background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.3);}
.card-blue  {background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.25);}
.card-teal  {background:rgba(20,184,166,.05);border:1px solid rgba(20,184,166,.3);}
.card-gold  {background:rgba(250,204,21,.05);border:1px solid rgba(250,204,21,.2);}
.card-purple{background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.25);}

.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.card-p{font-size:12px;line-height:1.5;color:#cbd5e1;margin-bottom:8px;}
.card-p:last-child{margin-bottom:0;}

/* Buttons */
.btn-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px;}
.btn{padding:8px 16px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:.15s;display:inline-flex;align-items:center;gap:5px;}
.btn-white {background:white;color:black;}
.btn-white:hover{background:#e2e8f0;}
.btn-outline{background:transparent;color:var(--text);border:1px solid rgba(255,255,255,.2);}
.btn-outline:hover{border-color:rgba(255,255,255,.4);}
.btn-green {background:rgba(16,185,129,.15);color:#6ee7b7;border:1px solid rgba(16,185,129,.3);}
.btn-red   {background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3);}
.btn-blue  {background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.3);}
.btn-teal  {background:rgba(20,184,166,.15);color:#5eead4;border:1px solid rgba(20,184,166,.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-full{width:100%;}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
.b-red   {background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3);}
.b-green {background:rgba(16,185,129,.15);color:#6ee7b7;border:1px solid rgba(16,185,129,.3);}
.b-purple{background:rgba(139,92,246,.15);color:#d8b4fe;border:1px solid rgba(139,92,246,.3);}
.b-blue  {background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.3);}
.b-orange{background:rgba(251,146,60,.15);color:#fed7aa;border:1px solid rgba(251,146,60,.3);}
.b-gray  {background:rgba(100,116,139,.15);color:#94a3b8;border:1px solid rgba(100,116,139,.3);}

/* Path cards */
.path-card{padding:10px 12px;border-radius:8px;background:rgba(15,23,42,.8);border:1px solid rgba(255,255,255,.08);cursor:pointer;transition:.2s;margin-bottom:6px;}
.path-card:hover{border-color:rgba(255,255,255,.2);}
.path-card.selected{border-color:var(--blue);background:rgba(59,130,246,.08);}
.path-card-title{font-weight:600;font-size:12px;margin-bottom:3px;}
.path-card-meta{font-size:10px;color:var(--muted);}

/* Mitigation card */
.mit-card{padding:10px 12px;border-radius:8px;background:rgba(15,23,42,.8);border:1px solid rgba(255,255,255,.07);cursor:pointer;transition:.2s;margin-bottom:8px;}
.mit-card:hover{border-color:rgba(255,255,255,.2);}
.mit-card-0{border-color:rgba(16,185,129,.3)!important;}
.mit-card-1{border-color:rgba(59,130,246,.3)!important;}
.mit-card-2{border-color:rgba(139,92,246,.3)!important;}
.mit-title-0{color:#10b981!important;}
.mit-title-1{color:#93c5fd!important;}
.mit-title-2{color:#d8b4fe!important;}

/* PCS breakdown */
.pcs-row{display:grid;grid-template-columns:1fr auto;gap:8px;font-size:10px;border-bottom:1px solid rgba(255,255,255,.05);padding:5px 0;}
.pcs-final{color:var(--red);font-weight:700;}

/* Proof box */
.proof-box{background:#040609;border-radius:5px;padding:7px 9px;font-family:monospace;font-size:9px;color:#38bdf8;white-space:pre-wrap;word-break:break-all;border:1px solid rgba(56,189,248,.12);margin-top:4px;}
.proof-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:6px;margin-bottom:2px;}
.oast-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);border-radius:4px;font-size:9px;color:#d8b4fe;margin-top:4px;}

/* Validation progress */
.val-prog{width:100%;background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.25);border-radius:10px;padding:14px;}
.val-prog-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.val-prog-title{display:flex;align-items:center;gap:8px;}
.spinner{width:13px;height:13px;border:2px solid rgba(59,130,246,.2);border-top:2px solid var(--blue);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
.val-prog-lbl{font-size:11px;font-weight:700;color:#93c5fd;text-transform:uppercase;letter-spacing:.5px;}
.val-timer{font-size:10px;color:var(--muted);font-family:monospace;}
.val-target{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:7px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05);margin-bottom:6px;}
.vt-left{display:flex;align-items:center;gap:8px;}
.vt-name{font-size:11px;font-weight:600;color:var(--text);}
.vt-meta{font-size:9px;font-family:monospace;color:var(--muted);}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--blue);display:inline-block;margin:0 1.5px;animation:wave .8s ease infinite;}
.dots span:nth-child(2){animation-delay:.15s;}
.dots span:nth-child(3){animation-delay:.3s;}
.pulsedot{width:6px;height:6px;border-radius:50%;background:var(--blue);display:inline-block;animation:pulse 1.2s infinite;}

/* Validation results */
.vr-exploit{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.3);}
.vr-mitigate{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.3);}
.nr{padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;gap:5px;}
.nr:last-child{border-bottom:none;padding-bottom:0;}
.nr-row{display:flex;align-items:center;justify-content:space-between;}
.nr-id{font-size:11px;font-weight:600;font-family:monospace;color:var(--text);}
.nr-cve{font-size:9px;color:var(--muted);margin-left:6px;}
.note-box{background:rgba(100,116,139,.08);border:1px solid rgba(100,116,139,.15);padding:6px 8px;border-radius:5px;font-size:10px;color:var(--muted);font-style:italic;line-height:1.4;margin-top:4px;}

/* Pre code */
pre.code{background:#0f172a;padding:10px;border-radius:6px;font-size:9px;color:#e2e8f0;overflow-x:auto;margin-top:8px;font-family:monospace;line-height:1.5;}

/* Grid info */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px;margin-top:8px;}
.ig-lbl{color:var(--muted);}
.ig-val{font-weight:600;color:var(--text);}

/* Typing indicator */
.typing{display:flex;gap:4px;padding:10px 14px;background:rgba(30,41,59,.6);border-radius:12px;width:fit-content;}
.dot{width:6px;height:6px;background:#cbd5e1;border-radius:50%;animation:wave 1.3s linear infinite;}
.dot:nth-child(2){animation-delay:-1.1s;}
.dot:nth-child(3){animation-delay:-.9s;}

/* Audit trail */
#audit-section{border-top:1px solid var(--border);background:rgba(10,13,22,.9);flex-shrink:0;}
.audit-toggle{padding:8px 16px;font-size:11px;color:var(--muted);cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;}
.audit-toggle:hover{color:var(--text);}
.audit-toggle strong{font-size:10px;text-transform:uppercase;letter-spacing:1px;}
#audit-log{padding:0 16px 12px;max-height:130px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
.audit-entry{font-size:10px;color:#cbd5e1;display:flex;gap:10px;border-left:2px solid var(--blue);padding-left:8px;}
.audit-time{color:var(--muted);min-width:58px;flex-shrink:0;}
#nlq-form{padding:12px 16px;border-top:1px solid rgba(255,255,255,.05);}
#nlq-input{width:100%;padding:10px 12px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.15);color:white;border-radius:8px;font-size:12px;outline:none;}
#nlq-input:focus{border-color:rgba(59,130,246,.5);}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px;}

@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes wave{0%,60%,100%{transform:initial}30%{transform:translateY(-4px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<header>
  <div class="hdr-left">
    <div class="hdr-avatar">🤖</div>
    <div>
      <div class="hdr-logo">Agent Iris</div>
      <div class="hdr-sub">Sentinel Orchestrator · Attack Path Intelligence</div>
    </div>
  </div>
  <div class="live-row">
    <div class="live-dot"><span></span></div>
    <span style="font-size:10px;color:var(--muted);font-family:monospace;">LIVE · TruConfirm connected</span>
  </div>
</header>

<div class="chat-wrap">
  <div class="chat-col">
    <div class="chat-subhdr">
      <div class="av av-blue" style="width:32px;height:32px;font-size:15px;">🤖</div>
      <div>
        <div style="font-size:13px;font-weight:600;">Agent Iris</div>
        <div id="phase-sub" style="font-size:10px;color:var(--muted);">Ready</div>
      </div>
      <span id="phase-badge" class="badge-phase" style="display:none;"></span>
    </div>

    <div id="chat-messages"></div>

    <div id="audit-section" style="display:none;">
      <div class="audit-toggle" onclick="toggleAudit()">
        <strong>Audit Trail &amp; Compliance Log</strong>
        <span id="audit-arrow">▲</span>
      </div>
      <div id="audit-log" style="display:none;"></div>
      <div id="nlq-section" style="display:none;">
        <form id="nlq-form" onsubmit="handleNLQ(event)">
          <input id="nlq-input" name="q" placeholder="Ask a hypothetical scenario..." autocomplete="off" />
        </form>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   MOCK DATA
═══════════════════════════════════════════════════════ */
const MOCK = {
  analysis: {

      { node_id:'A', ip_address:'10.1.0.5',  cve_id:'CVE-2023-50164', ingress_port:443,  label:'Discovery Asset VM' },

      { node_id:'C', ip_address:'10.1.3.7',  cve_id:'CVE-2021-44228', ingress_port:8080, label:'Web Shell Execution' },

    { node_id:'A', cve_id:'CVE-2023-50164', status:'EXPLOIT_VALIDATED', method:'PATTERN_BASED_OUTPUT', extracted_output:'$ curl -X POST /upload -F file=@shell.php\nHTTP/1.1 200 OK\n{"uploaded":"shell.php","path":"/var/www/upload/shell.php"}' },

    { node_id:'F', cve_id:'CVE-2023-23397', status:'EXPLOIT_MITIGATED' },
    { node_id:'G', cve_id:'CVE-2020-1472',  status:'EXPLOIT_MITIGATED' },

# Conditional Access: Require MFA for Identity Provider
resource "azuread_conditional_access_policy" "mfa_idp" {
  display_name = "Require MFA - Identity Provider Access"
  state        = "enabled"
  conditions {
    applications { included_applications = ["all"] }
    users        { included_users        = ["all"] }

const $msgs = () => document.getElementById('chat-messages');

const $phaseSub = () => document.getElementById('phase-sub');

function ts() { return new Date().toLocaleTimeString(); }
function now() { return Date.now(); }

function scrollBottom() {
  setTimeout(() => { const m = $msgs(); if(m) m.scrollTop = m.scrollHeight; }, 50);
}

function setPhaseBadge(text, show=true) {
  const b = $phaseBadge();
  b.textContent = text;

function setPhaseSub(text) { $phaseSub().textContent = text; }

function logAudit(text) {
  state.auditLogs.push({ time: ts(), text });

  entry.className = 'audit-entry';
  entry.innerHTML = `<span class="audit-time">${ts()}</span><span>${text}</span>`;
  $audit().appendChild(entry);
  $audit().scrollTop = $audit().scrollHeight;
}

function showAuditSection() {
  $auditSec().style.display = 'block';
}

function toggleAudit() {
  state.auditOpen = !state.auditOpen;

═══════════════════════════════════════════════════════ */
function appendMsg(senderType, avatarClass, identity, identityColor, html, extraClass='') {
  const row = document.createElement('div');
  row.className = `msg-row ${senderType}`;

  if (senderType === 'agent') {
    row.innerHTML = `
      <div class="av ${avatarClass}">🤖</div>
      <div class="msg-content">
        ${identity ? `<span class="identity" style="color:${identityColor}">${identity}</span>` : ''}
        <div class="${extraClass || ''}">${html}</div>
      </div>`;
  } else {
    row.innerHTML = `
      <div class="msg-content">
        <div class="bubble user">${html}</div>
      </div>
      <div class="av av-gray">👤</div>`;
  }

  $msgs().appendChild(row);
  scrollBottom();
  return row;
}

function agentBubble(identity, color, avClass, text) {
  appendMsg('agent', avClass, identity, color, `<div class="bubble">${text}</div>`);
}

function userBubble(text) {
  appendMsg('user', '', '', '', text);
}

let typingRow = null;
function showTyping() {
  typingRow = document.createElement('div');
  typingRow.className = 'msg-row agent';
  typingRow.innerHTML = `<div class="av av-gray">🤖</div><div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
  $msgs().appendChild(typingRow);
  scrollBottom();
}
function hideTyping() {
  if(typingRow) { typingRow.remove(); typingRow = null; }
}

function delay(fn, ms) {
  showTyping();
  return setTimeout(() => { hideTyping(); fn(); }, ms);
}

  logAudit(`TruConfirm: Callback received — ${results.length} node(s) assessed in ${durationMs}ms`);
  const allValidated = results.every(r=>r.status==='EXPLOIT_VALIDATED');
  const allMitigated = results.every(r=>r.status==='EXPLOIT_MITIGATED');
  const identity = isRevalidation ? 'Agent Iris · TruConfirm Re-Validation' : 'Agent Iris · TruConfirm Results';
  const headColor = allMitigated ? '#10b981' : '#ef4444';
  const cardClass = allMitigated ? 'card-green' : 'card-red';
  const headline = allMitigated
    ? `Mitigation Confirmed — ${results.length} / ${results.length} Nodes Blocked`
    : allValidated
    ? `Exploit Validated — ${results.length} / ${results.length} Nodes Confirmed`
    : 'Validation Inconclusive — Mixed Results';
  const dotStyle = `width:6px;height:6px;border-radius:50%;background:${headColor};display:inline-block;box-shadow:0 0 5px ${headColor};flex-shrink:0;`;

  const nodesHtml = results.map(r => {
    const isProven = r.status === 'EXPLOIT_VALIDATED';
    const isMitigated = r.status === 'EXPLOIT_MITIGATED';
    const badgeCls = isProven ? 'b-red' : isMitigated ? 'b-green' : 'b-gray';
    const badgeLbl = isProven ? 'Exploit Validated' : isMitigated ? 'Exploit Mitigated' : 'Inconclusive';
    let evidenceHtml = '';
    if(isProven && r.method) {
      if(r.method === 'OUT_OF_BAND_CALLBACK') {
        evidenceHtml = `<div class="proof-lbl">Out-of-Band Callback (OAST)</div>
          <span class="oast-badge">📡 Blind callback confirmed · ${r.oast_domain||'dns.oast.live'}</span>`;
      } else if(r.method === 'CRYPTOGRAPHIC_HASH_MATCHING') {
        evidenceHtml = `<div class="proof-lbl">Cryptographic Hash</div>
          <div class="proof-box">${r.computed_hash}</div>`;
      } else if(r.extracted_output) {
        evidenceHtml = `<div class="proof-lbl">Pattern-Based Output</div>
          <div class="proof-box">${r.extracted_output}</div>`;
      }
    }
    if(isMitigated) {
      evidenceHtml = `<div class="note-box">Environmental defenses confirmed blocking node ${r.node_id}. Exploit payload rejected — mitigation verified.</div>`;
    }
    return `<div class="nr">
      <div class="nr-row">
        <div><span class="nr-id">${r.node_id}</span><span class="nr-cve">${r.cve_id}</span></div>
        <span class="badge ${badgeCls}">${badgeLbl}</span>
      </div>
      ${evidenceHtml}
    </div>`;
  }).join('');

  let actionsHtml = '';
  if(isRevalidation && allMitigated) {
    actionsHtml = `<div class="btn-row">
      <button class="btn btn-white" style="flex:1" onclick="showP3Policy()">Show Policy Preview</button>
      <button class="btn btn-teal" style="flex:1" onclick="showBypassPrompt()">Continue →</button>
    </div>`;
  } else if(!isRevalidation) {
    actionsHtml = `<p style="font-size:11px;color:var(--muted);margin-top:10px;">All paths empirically confirmed. Select a mitigation option above ↑</p>`;
  }

  const html = `<div class="card ${cardClass}" style="border-radius:10px;padding:14px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="${dotStyle}"></span>
        <strong style="font-size:11px;font-weight:700;color:${headColor};text-transform:uppercase;letter-spacing:.4px;">${headline}</strong>
      </div>
      <span style="font-size:9px;color:var(--muted);font-family:monospace;">${(durationMs/1000).toFixed(1)}s</span>
    </div>
    ${nodesHtml}
    ${actionsHtml}
  </div>`;
  const avCls = allMitigated ? 'av-green' : 'av-red';
  const identColor = allMitigated ? '#10b981' : '#ef4444';
  appendMsg('agent', avCls, identity, identColor, html);
}

function deployP3Fix(mitigationId, mitigationLabel) {
  if(state.phase !== 'p3_remediation_options') return;
  state.phase = 'p3_fixing';
  userBubble(`Deploy ${mitigationLabel}`);
  logAudit(`Remediation Agent: Applying ${mitigationLabel}. MitigationID: ${mitigationId}`);

  const mitData = MOCK.mitigation[mitigationId] || MOCK.mitigation['patch-shadow-api'];
  state.phase3Mitigation = mitData;

  delay(() => agentBubble('Remediation Agent','#fb923c','av-orange',`Applying <strong>${mitData.mitigation.label}</strong>. Target: Node ${mitData.mitigation.targetNode}. Expected PCS reduction: ${mitData.mitigation.scoreReduction.toFixed(1)}.`), 900);
  setTimeout(() => delay(() => appendMsg('agent','av-green','','',`<div class="card card-green"><div style="color:var(--green);font-weight:600;margin-bottom:6px;">✔ Mitigation Deployment</div><p class="card-p">Re-launching validation to confirm exploitation is blocked...</p></div>`), 1000), 2800);

  // Re-validation
  setTimeout(() => startRevalidation(), 5500);
}

function startRevalidation() {
  const targets = MOCK.simulation.validationTargets;
  state.phase = 'p3_revalidating';
  logAudit(`Agent Iris: Re-delegating ${targets.length} node(s) to TruConfirm to confirm EXPLOIT_MITIGATED state.`);

  let elapsed = 0;
  const timerId2 = 'val-elapsed-2';
  const html = `<div class="val-prog">
    <div class="val-prog-hdr">
      <div class="val-prog-title">
        <div class="spinner"></div>
        <span class="val-prog-lbl">Re-Validating After Mitigation</span>
      </div>
      <span class="val-timer" id="${timerId2}">00:00 elapsed</span>
    </div>
    ${targets.map(t=>`
      <div class="val-target">
        <div class="vt-left">
          <span class="pulsedot"></span>
          <div>
            <div class="vt-name">Node ${t.node_id} — ${t.label}</div>
            <div class="vt-meta">${t.cve_id} · ${t.ip_address}:${t.ingress_port}</div>
          </div>
        </div>
        <div class="dots"><span></span><span></span><span></span></div>
      </div>`).join('')}
    <div style="font-size:10px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-top:2px;">
      <span class="pulsedot"></span>
      Confirming mitigation effectiveness across ${targets.length} nodes...
    </div>
  </div>`;
  appendMsg('agent','av-blue','Agent Iris · TruConfirm','#3b82f6',html);

  const tick2 = setInterval(() => {
    elapsed++;
    const el = document.getElementById(timerId2);
    if(el) {
      const m = String(Math.floor(elapsed/60)).padStart(2,'0');
      const s = String(elapsed%60).padStart(2,'0');
      el.textContent = `${m}:${s} elapsed`;
    }
  }, 1000);

  setTimeout(() => {
    clearInterval(tick2);
    renderValidationResults(MOCK.revalidationResults, true, 3110);
    state.phase = 'p3_bypass';
    const mitData = state.phase3Mitigation;
    setTimeout(() => {
      agentBubble('Reporting Agent','#14b8a6','av-teal',
        `Re-validation complete. All ${MOCK.revalidationResults.length} attack vectors confirmed blocked with empirical proof. Residual PCS: <strong style="color:var(--green)">${mitData?.pcsScore.toFixed(1) ?? '1.6'}</strong>. Generating executive report with TruConfirm proof bundle attached.`);
      logAudit(`Reporting Agent: Residual PCS ${mitData?.pcsScore.toFixed(1) ?? '1.6'}. Proof bundle ready.`);
    }, 400);
  }, 3200);
}

function showBypassPrompt() {
  const mitData = state.phase3Mitigation;
  const html = `<div class="card card-green">
    <p class="card-p">
      Mitigation holds. Residual active paths: <strong>${mitData?.activePaths ?? 1}</strong>. Residual PCS: <strong style="color:var(--green)">${mitData?.pcsScore?.toFixed(1) ?? '1.6'}</strong>.
      Shall I simulate what happens if the attacker attempts a bypass?
    </p>
    <div style="font-size:11px;color:#cbd5e1;margin-top:8px;">
      Approval gate: ${mitData?.mitigation?.approvalGate ?? '–'}<br/>
      Rollback: ${mitData?.mitigation?.rollback ?? '–'}
    </div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="showP3Policy()">Show Policy Preview</button>
      <button class="btn btn-white" onclick="simulateBypass()">Yes, simulate bypass</button>
    </div>
  </div>`;
  appendMsg('agent','av-green','','',html);
  document.getElementById('nlq-section').style.display = 'block';
}

function showP3Policy() {
  userBubble('Show policy preview and approval package');
  delay(() => {
    const html = `<div class="card card-blue">
      <div class="card-title" style="color:#38bdf8;">Policy-as-Code Preview</div>
      <p style="font-size:11px;color:#cbd5e1;margin-bottom:8px;">Type: ${MOCK.policy.type}</p>
      <pre class="code">${MOCK.policy.content}</pre>
      <p style="font-size:11px;color:var(--muted);margin-top:8px;">Approval: ${state.phase3Mitigation?.mitigation?.approvalGate ?? '–'}</p>
    </div>`;
    appendMsg('agent','av-teal','Reporting Agent','#14b8a6',html);
  }, 800);
}

function simulateBypass() {
  userBubble('Yes, simulate bypass');
  state.phase = 'p3_bypassing';
  delay(() => agentBubble('Simulation Agent','#a855f7','av-purple','Attempting alternate traversal via T1059 (Command and Scripting Interpreter)...'), 900);
  setTimeout(() => delay(() => {
    const html = `<div class="card card-dark">
      <h4 style="color:var(--green);margin-bottom:8px;">No Viable Bypass Found</h4>
      <p class="card-p">Secondary traversal blocked. Remediation holds. Environment PCS stabilized at <strong style="color:var(--green)">${state.phase3Mitigation?.pcsScore?.toFixed(1) ?? '1.6'}</strong>.</p>
      <div class="btn-row">
        <button class="btn btn-white btn-full" onclick="showP3Report()">Generate Agent Iris Report</button>
      </div>
    </div>`;
    appendMsg('agent','av-green','','',html);
    state.phase = 'p3_complete';
  }, 1400), 4000);
}

function showP3Report() {
  userBubble('Generate executive and technical report');
  delay(() => {
    const r = MOCK.report;
    const html = `<div class="card card-teal">
      <div class="card-title" style="color:var(--teal);">Agent Iris Report Package</div>
      <div style="display:flex;flex-direction:column;gap:8px;font-size:11px;margin-top:4px;">
        <div><strong>Headline:</strong> ${r.headline}</div>
        <div><strong>Business Impact:</strong> ${r.businessImpact}</div>
        <div><strong>Technical Summary:</strong> ${r.technicalSummary}</div>
        <div><strong>Recommended Action:</strong> ${r.recommendedAction}</div>
        <div><strong>Rollback:</strong> ${r.rollback}</div>
      </div>
      <div class="btn-row" style="margin-top:14px;">
        <button class="btn btn-outline btn-full" onclick="initIntro()">↻ Restart Agent Workflow</button>
      </div>
    </div>`;
    appendMsg('agent','av-teal','Reporting Agent','#14b8a6',html);
    logAudit('Reporting Agent: Executive report package generated. Workflow complete.');
  }, 1000);
}

function handleNLQ(e) {
  e.preventDefault();
  const q = e.target.elements.q.value.trim();
  if(!q) return;
  e.target.reset();
  userBubble(q);
  logAudit(`User: What-if query — "${q}"`);

  const answers = {
    default: `Removing the VPN Access Gateway would close 1 path and reduce PCS from ${state.phase3Mitigation?.pcsScore?.toFixed(1) ?? '1.6'} to approximately 0.8. However, it introduces an estimated 45ms latency for remote employees.`,
    shadow:  'Hardening the Shadow API endpoint (object-level authorization enforcement) would eliminate the BOLA traversal vector entirely, closing 3 of 4 paths and dropping PCS to 0.4.',
    database:'Moving the database to an isolated VPC would reduce blast-radius exposure by 87% but introduces ~45ms latency for the Finance Application and requires a 2-hour maintenance window.',
  };
  const key = q.toLowerCase().includes('shadow') ? 'shadow' : q.toLowerCase().includes('database') ? 'database' : 'default';
  delay(() => agentBubble('Analytics Agent','#6366f1','av-purple', answers[key]), 1200);
}
